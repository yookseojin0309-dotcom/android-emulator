name: Android Emulator
on: [push, workflow_dispatch]
jobs:
  emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils websockify --fix-missing
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Install noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git /opt/novnc
          git clone https://github.com/novnc/websockify /opt/novnc/utils/websockify

      - name: Download disk from Google Drive
        run: |
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > credentials.json
          python3 << 'EOF'
          import json, os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          import io

          creds = service_account.Credentials.from_service_account_file(
              'credentials.json',
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)
          folder_id = '${{ secrets.GDRIVE_FOLDER_ID }}'
          results = service.files().list(
              q=f"'{folder_id}' in parents and name='blissos.qcow2'",
              fields="files(id, name)"
          ).execute()
          files = results.get('files', [])
          if files:
              print("Found existing disk image, downloading...")
              file_id = files[0]['id']
              request = service.files().get_media(fileId=file_id)
              with open('blissos.qcow2', 'wb') as f:
                  downloader = MediaIoBaseDownload(f, request)
                  done = False
                  while not done:
                      status, done = downloader.next_chunk()
                      print(f"Download {int(status.progress() * 100)}%")
              print("Download complete!")
          else:
              print("No existing disk found, will download Bliss OS ISO")
              open('NEEDS_INSTALL', 'w').close()
          EOF

      - name: Download Bliss OS ISO if needed
        run: |
          if [ -f NEEDS_INSTALL ]; then
            wget -O blissos.iso "https://sourceforge.net/projects/blissos-x86/files/Official/BlissOS16/Gapps/Generic/Bliss-v16.9.7-x86_64-OFFICIAL-gapps-20241011.iso/download"
            qemu-img create -f qcow2 blissos.qcow2 16G
          fi

      - name: Setup ngrok and start emulator
        run: |
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          ./ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          ./ngrok http 6080 &
          sleep 5
          curl -s http://localhost:4040/api/tunnels | python3 -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])"
          /opt/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &
          sleep 3
          if [ -f NEEDS_INSTALL ]; then
            qemu-system-x86_64 -m 2048 -enable-kvm -cpu host -boot d -cdrom blissos.iso -hda blissos.qcow2 -vnc :0 &
          else
            qemu-system-x86_64 -m 2048 -enable-kvm -cpu host -hda blissos.qcow2 -vnc :0 &
          fi
          sleep 3600

      - name: Save disk to Google Drive
        if: always()
        run: |
          python3 << 'EOF'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds = service_account.Credentials.from_service_account_file(
              'credentials.json',
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)
          folder_id = '${{ secrets.GDRIVE_FOLDER_ID }}'
          results = service.files().list(
              q=f"'{folder_id}' in parents and name='blissos.qcow2'",
              fields="files(id)"
          ).execute()
          files = results.get('files', [])
          media = MediaFileUpload('blissos.qcow2', resumable=True)
          if files:
              print("Updating existing disk image...")
              service.files().update(fileId=files[0]['id'], media_body=media).execute()
          else:
              print("Uploading new disk image...")
              service.files().create(
                  body={'name': 'blissos.qcow2', 'parents': [folder_id]},
                  media_body=media
              ).execute()
          print("Upload complete!")
          EOF
